name: Live Score Updater

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger for testing

# Prevent two runs overlapping and conflicting on git push.
# cancel-in-progress: true means if a new cron fires while the previous run
# is still going, the old one is cancelled and fresh data takes over.
concurrency:
  group: live-score-updater
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Fetch live scores and patch .ics
        run: python live_score_updater.py

      - name: Commit and push if .ics changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- 2026_FIFA_World_Cup.ics state.json; then
            git add 2026_FIFA_World_Cup.ics state.json
            git commit -m "live: score update"
            git push
          fi
