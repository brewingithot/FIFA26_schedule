name: Live Score Updater

on:
  # schedule:
  #   - cron: '*/5 * * * *'   # every 5 minutes — disabled, trigger manually
  workflow_dispatch:          # allow manual trigger for testing

# Prevent two runs overlapping and conflicting on git push.
# cancel-in-progress: true means if a new cron fires while the previous run
# is still going, the old one is cancelled and fresh data takes over.
concurrency:
  group: live-score-updater
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Fetch live scores and patch .ics
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python live_score_updater.py

      - name: Commit and push if .ics changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 2026_FIFA_World_Cup.ics state.json
          [ -f scores.json ] && git add scores.json || true          if ! git diff --cached --quiet; then
            git commit -m "live: score update"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep $((i * 2))
            done
          fi
